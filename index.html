<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Store</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="logo.png">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark fixed-top p-3 d-flex justify-content-between">
  <button class="btn btn-dark d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
    <span class="navbar-toggler-icon"></span>
  </button>
  <h4 class="text-white m-0">Solar Store</h4>
<div id="navUserArea">
    <a href="login.html" id="loginBtn" class="btn btn-outline-light">Login</a>
    <div id="profileCircle" class="profile-circle d-none"></div>
</div>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- DESKTOP SIDEBAR -->
    <div class="col-md-3 d-none d-md-block sidebar">
      <h5>Categories</h5>
      <button class="category-btn" data-cat="all">All Products</button>
      <button class="category-btn" data-cat="panel">Solar Panels</button>
      <button class="category-btn" data-cat="battery">Batteries</button>
      <button class="category-btn" data-cat="lcd">LCD Displays</button>
      <button class="category-btn" data-cat="inverter">Inverters</button>
      <button class="category-btn" data-cat="controller">Controllers</button>
      <button class="category-btn" data-cat="light">Solar Lights</button>
    </div>

    <!-- MOBILE SIDEBAR OFFCANVAS -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" style="width: 70%;">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Categories</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <button class="category-btn mb-2" data-cat="all">All Products</button>
        <button class="category-btn mb-2" data-cat="panel">Solar Panels</button>
        <button class="category-btn mb-2" data-cat="battery">Batteries</button>
        <button class="category-btn mb-2" data-cat="lcd">LCD Displays</button>
        <button class="category-btn mb-2" data-cat="inverter">Inverters</button>
        <button class="category-btn mb-2" data-cat="controller">Controllers</button>
        <button class="category-btn mb-2" data-cat="light">Solar Lights</button>
      </div>
    </div>

    <!-- PRODUCT AREA -->
    <div class="col-md-9" id="productContainer">
      <div class="row" id="product-list"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
